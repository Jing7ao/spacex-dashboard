<!DOCTYPE html><html><head><meta charset="UTF-8"><title>API Test 2</title>
<style>body{font-family:monospace;background:#111;color:#eee;padding:20px;font-size:14px}</style></head><body>
<h2>Alt API Test</h2>
<div id="out"></div>
<script>
var out=document.getElementById('out');
function log(m,c){out.innerHTML+='<div style="color:'+(c||'#fff')+'">'+m+'</div>';}

log('Test 1: Tencent (gtimg.cn) JSONP via script tag','#ff0');
var s=document.createElement('script');
s.src='https://web.sqt.gtimg.cn/q=sz002149,sz300136,sh688102';
s.onload=function(){
  log('Tencent script loaded OK','#0f0');
  // Check for data — Tencent returns v_xxx="data"
  var keys=['v_sz002149','v_sz300136','v_sh688102'];
  for(var i=0;i<keys.length;i++){
    if(window[keys[i]])log('  '+keys[i]+': '+window[keys[i]].slice(0,100),'#0f0');
    else log('  '+keys[i]+': not found','#f00');
  }
};
s.onerror=function(){log('Tencent SCRIPT LOAD FAILED','#f00');};
document.head.appendChild(s);

log('Test 2: Sina K-line JSON API','#ff0');
fetch('https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=sz002149&scale=240&ma=no&datalen=3')
  .then(function(r){return r.json()})
  .then(function(j){log('Sina K-line OK: '+j.length+' entries','#0f0')})
  .catch(function(e){log('Sina K-line FAILED: '+e.message,'#f00')});

log('Test 3: Eastmoney main website domain','#ff0');
var s2=document.createElement('script');
s2.src='https://push2.eastmoney.com/api/qt/stock/get?secid=0.002149&fields=f2,f3,f14&cb=testCb';
window.testCb=function(d){log('Eastmoney JSONP OK: '+JSON.stringify(d),'#0f0')};
s2.onerror=function(){log('Eastmoney SCRIPT FAILED','#f00')};
s2.onload=function(){if(!window._emOk){log('Eastmoney: loaded but no callback','#f00')}};
document.head.appendChild(s2);
</script></body></html>
