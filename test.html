<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Connection Test</title>
<style>body{font-family:monospace;background:#111;color:#eee;padding:20px} .ok{color:#0f0} .fail{color:#f00} .info{color:#ff0}</style></head>
<body>
<h2>Connection Diagnostic</h2>
<div id="results"></div>
<script>
const results = document.getElementById('results');
function log(msg, cls) { results.innerHTML += `<div class="${cls||''}">${msg}</div>`; }

async function runTests() {
  log('=== Testing Proxy Server ===', 'info');
  log('Proxy base: ' + window.location.origin, 'info');

  // Test 1: Static file serving
  try {
    const r1 = await fetch(window.location.href);
    log('Test 1 - Static serving: OK (' + r1.status + ')', 'ok');
  } catch(e) { log('Test 1 - Static serving: FAILED - ' + e.message, 'fail'); }

  // Test 2: Proxy to Eastmoney
  const testUrl = window.location.origin + '/api/em/qt/ulist.np/get?fltt=2&secids=0.002149&fields=f2,f3,f12,f14&_=' + Date.now();
  log('Test 2 - Fetching: ' + testUrl, 'info');
  try {
    const r2 = await fetch(testUrl);
    const j2 = await r2.json();
    if (j2.data && j2.data.diff) {
      log('Test 2 - Eastmoney API: OK - got ' + j2.data.diff.length + ' stocks', 'ok');
      log('Sample: ' + JSON.stringify(j2.data.diff[0]), 'info');
    } else {
      log('Test 2 - Eastmoney API: Unexpected response: ' + JSON.stringify(j2).slice(0,200), 'fail');
    }
  } catch(e) { log('Test 2 - Eastmoney API: FAILED - ' + e.message, 'fail'); }

  // Test 3: Yahoo Finance
  const yUrl = window.location.origin + '/api/yahoo/chart/%5EGSPC?interval=1d&range=5d';
  log('Test 3 - Fetching Yahoo: ' + yUrl, 'info');
  try {
    const r3 = await fetch(yUrl);
    const j3 = await r3.json();
    if (j3.chart && j3.chart.result) {
      const price = j3.chart.result[0].meta.regularMarketPrice;
      log('Test 3 - Yahoo Finance: OK - S&P500 = ' + price, 'ok');
    } else {
      log('Test 3 - Yahoo Finance: Unexpected: ' + JSON.stringify(j3).slice(0,200), 'fail');
    }
  } catch(e) { log('Test 3 - Yahoo Finance: FAILED - ' + e.message, 'fail'); }

  // Test 4: Eastmoney K-line
  const kUrl = window.location.origin + '/api/emhis/qt/stock/kline/get?secid=0.002149&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56&klt=101&fqt=0&end=20500101&lmt=5&_=' + Date.now();
  log('Test 4 - K-line: ' + kUrl, 'info');
  try {
    const r4 = await fetch(kUrl);
    const j4 = await r4.json();
    if (j4.data && j4.data.klines) {
      log('Test 4 - K-line API: OK - got ' + j4.data.klines.length + ' entries', 'ok');
    } else {
      log('Test 4 - K-line API: Unexpected: ' + JSON.stringify(j4).slice(0,200), 'fail');
    }
  } catch(e) { log('Test 4 - K-line API: FAILED - ' + e.message, 'fail'); }

  // Test 5: Direct Eastmoney (no proxy - likely fails due to CORS)
  log('Test 5 - Direct Eastmoney (CORS test)...', 'info');
  try {
    const r5 = await fetch('https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&secids=0.002149&fields=f2,f3,f12,f14');
    log('Test 5 - Direct: OK (CORS not blocked!)', 'ok');
  } catch(e) { log('Test 5 - Direct: CORS blocked (expected): ' + e.message, 'fail'); }

  log('=== All tests complete ===', 'info');
  log('If Test 2/3/4 fail, proxy.js may have network/firewall issues.', 'info');
  log('If only Test 5 fails, CORS is working as expected (proxy needed).', 'info');
}
runTests();
</script>
</body></html>
