name: Briefing

on:
  schedule:
    - cron: '45 0 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          HOUR=$(TZ='Asia/Shanghai' date +%H)
          if [ "$HOUR" -lt 12 ]; then
            python morning_brief.py
          else
            python evening_brief.py
          fi
