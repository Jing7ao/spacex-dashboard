<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🔗 供应链映射模型 · 总览 v2.7</title>
<style>
:root{--bg:#0f1117;--ca:#1a1d27;--bd:#252836;--t1:#e2e8f0;--t2:#94a3b8;--t3:#64748b;--ac:#3b82f6;--gr:#22c55e;--rd:#ef4444;--yl:#eab308;--or:#f97316}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;padding:16px;max-width:1100px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--bd);margin-bottom:16px;flex-wrap:wrap;gap:8px}
header h1{font-size:1.3rem;background:linear-gradient(135deg,#ef4444,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{display:inline-block;padding:2px 7px;border-radius:3px;font-size:0.6rem;font-weight:600}
.badge-us{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.2)}
.badge-cn{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.badge-bn{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3)}
.badge-ok{background:rgba(34,197,94,.12);color:#4ade80}
.badge-warn{background:rgba(234,179,8,.12);color:#eab308}
.badge-stale{background:rgba(148,163,184,.1);color:#94a3b8}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
@media(max-width:900px){.grid-6{grid-template-columns:repeat(3,1fr)}}
.panel{background:var(--ca);border:1px solid var(--bd);border-radius:8px;padding:14px}
.panel.alert{border-color:rgba(239,68,68,.3);background:rgba(239,68,68,.03)}
.panel.warn{border-color:rgba(234,179,8,.3);background:rgba(234,179,8,.03)}
.panel-title{font-size:0.65rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;font-weight:600}
.eco-card{text-align:center;padding:10px 6px;border-radius:8px;cursor:pointer;transition:border-color .2s;border:1px solid var(--bd);background:var(--ca)}
.eco-card:hover{border-color:var(--ac)}
.eco-card .name{font-size:0.7rem;font-weight:600;margin-bottom:4px}
.eco-card .count{font-size:1.4rem;font-weight:700}
.eco-card .sw{font-size:0.55rem;color:#f87171;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:0.68rem}
th{text-align:left;padding:4px 6px;color:var(--t3);font-weight:500;font-size:0.6rem;border-bottom:1px solid var(--bd)}
td{padding:4px 6px;border-bottom:1px solid rgba(37,40,54,.3);vertical-align:top}
tr:hover{background:rgba(59,130,246,.03)}
.gap-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:0.68rem;border-bottom:1px solid rgba(37,40,54,.3)}
.gap-row:last-child{border-bottom:none}
.metric{text-align:center}
.metric .v{font-size:1.3rem;font-weight:700}
.metric .l{font-size:0.58rem;color:var(--t3);margin-top:2px}
.note{font-size:0.6rem;color:var(--t3);margin-top:16px;line-height:1.8}
a{color:var(--ac);text-decoration:none}
.progress-bar{height:6px;border-radius:3px;background:var(--bd);margin:4px 0}
.progress-fill{height:6px;border-radius:3px}
.stale{color:var(--rd)}.fresh{color:var(--gr)}
</style>
</head>
<body>

<header>
  <h1>🔗 供应链映射模型 · 总览</h1>
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <span class="badge badge-ok" id="freshBadge">⏳ 加载中…</span>
    <span style="font-size:0.6rem;color:var(--t3)">v2.7 · 2026-06-06</span>
    <a href="index.html" style="font-size:0.6rem;color:var(--t3)">📊 监控</a>
    <a href="stock-view.html" style="font-size:0.6rem;color:var(--t3)">📋 单票</a>
    <a href="supply-chain.html" style="font-size:0.6rem;color:var(--t3)">🇺🇸 图谱</a>
    <a href="domestic-supply-chain.html" style="font-size:0.6rem;color:var(--t3)">🇨🇳 图谱</a>
  </div>
</header>

<!-- ═══ ECOSYSTEM OVERVIEW ═══ -->
<div class="grid-6" style="margin-bottom:12px" id="ecoGrid"></div>

<!-- ═══ DATA FRESHNESS ═══ -->
<div class="grid-2" style="margin-bottom:12px">
  <div class="panel warn" id="freshnessPanel"></div>
  <div class="panel" id="pricePanel"><div class="panel-title">💹 物理开关实时股价 (新浪API · 自动获取)</div><div id="priceContent" style="font-size:0.68rem;color:var(--t3)">⏳ 正在获取实时股价…</div></div>
</div>

<div class="panel alert" id="actionsPanel" style="margin-bottom:12px"></div>

<!-- ═══ BOTTLENECK TABLE ═══ -->
<div class="panel" style="margin-bottom:12px">
  <div class="panel-title">🔴 物理开关 × 全生态评分对比</div>
  <table id="bnTable"><thead><tr><th>标的</th><th>生态</th><th>§18.6</th><th>P</th><th>O</th><th>T</th><th>最强E1</th><th>最大风险</th><th>评级</th></tr></thead><tbody></tbody></table>
</div>

<!-- ═══ CROSS-ECO MATRIX ═══ -->
<div class="panel" style="margin-bottom:12px">
  <div class="panel-title">🔄 跨生态标的 (≥2个生态)</div>
  <table id="crossTable"><thead><tr><th>标的</th><th>马斯克</th><th>英伟达</th><th>AI算力</th><th>商业航天</th><th>机器人</th><th>低空经济</th><th>重叠度</th></tr></thead><tbody></tbody></table>
</div>

<!-- ═══ EVIDENCE GAPS ═══ -->
<div class="panel warn">
  <div class="panel-title">📋 当前全部 E1 证据缺口 (按优先级)</div>
  <div id="gapsList"></div>
</div>

<div id="validateWarn" style="display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:0.68rem;color:#f87171"></div>

<div class="note" id="footer"></div>

<script src="stock-price-fetcher.js"></script>
<script>
// 自动数据校验 — 每次打开页面自动跑
(function(){
  fetch('stock-data.json').then(function(r){return r.json()}).then(function(stocks){
    var warns = [];
    stocks.forEach(function(s){
      var sd = s.score_detail||{};
      var total = Object.values(sd).reduce(function(a,v){return a+(typeof v==='number'?v:0);},0);
      if(total !== s.score_v26) warns.push(s.code+' '+s.name+': score_detail sum='+total+' != score_v26='+s.score_v26);
    });
    if(warns.length>0){
      var el = document.getElementById('validateWarn');
      el.style.display='block';
      el.innerHTML='<b>⚠️ 数据一致性问题 ('+warns.length+'):</b> '+warns.slice(0,3).join('; ')+(warns.length>3?' ...还有'+(warns.length-3)+'处':'')+' <br><span style="font-size:0.6rem">修复: python validate-data.py</span>';
    }
  }).catch(function(){});

  fetch('events.json').then(function(r){return r.json()}).then(function(events){
    var noCode = events.filter(function(e){return !e.stock_code;}).length;
    var noDate = events.filter(function(e){return !e.event_date;}).length;
    if(noCode>0||noDate>0){
      var el = document.getElementById('validateWarn');
      el.style.display='block';
      el.innerHTML=(el.innerHTML||'')+'<br><b>⚠️ 事件数据:</b> '+noCode+'条缺stock_code, '+noDate+'条缺event_date';
    }
  }).catch(function(){});
})();
</script>
<script>
// ═══ DATA ═══
const ECOS = {
  '马斯克生态':{icon:'🚀',type:'us',stocks:29,sw:0},
  '英伟达生态':{icon:'🧠',type:'us',stocks:24,sw:0},
  '国产AI算力':{icon:'💻',type:'cn',stocks:20,sw:2},
  '中国商业航天':{icon:'🛰️',type:'cn',stocks:12,sw:1},
  '国产机器人':{icon:'🤖',type:'cn',stocks:12,sw:1},
  '低空经济':{icon:'🚁',type:'cn',stocks:15,sw:1}
};

const CROSS_DATA = [
  {name:'长电科技',code:'600584',musk:'',nv:'✅ H20',ai:'✅ 昇腾封装',space:'',robot:'',low:'',overlap:2},
  {name:'通富微电',code:'002156',musk:'',nv:'✅ Chiplet',ai:'✅ 昇腾备份',space:'',robot:'',low:'',overlap:2},
  {name:'英维克',code:'002837',musk:'',nv:'✅ 液冷',ai:'✅ 华为液冷',space:'',robot:'',low:'',overlap:2},
  {name:'麦格米特',code:'002851',musk:'',nv:'✅ 电源',ai:'✅ AIDC供电',space:'',robot:'',low:'',overlap:2},
  {name:'中际旭创',code:'300308',musk:'',nv:'✅ 光模块',ai:'✅ 光模块',space:'',robot:'',low:'',overlap:2},
  {name:'菲利华',code:'300395',musk:'✅ Starlink',nv:'✅ Q布',ai:'',space:'',robot:'',low:'',overlap:2},
  {name:'拓普集团',code:'601689',musk:'✅ Tesla',nv:'',ai:'',space:'',robot:'✅ 执行器',low:'',overlap:2},
  {name:'三花智控',code:'002050',musk:'✅ Tesla',nv:'',ai:'',space:'',robot:'✅ 执行器',low:'',overlap:2},
  {name:'绿的谐波',code:'688017',musk:'✅ Optimus',nv:'',ai:'',space:'',robot:'✅ 减速器',low:'',overlap:2},
  {name:'柯力传感',code:'603662',musk:'✅ Optimus',nv:'',ai:'',space:'',robot:'✅ 六维力',low:'',overlap:2},
  {name:'沪电股份',code:'002463',musk:'✅ Starlink',nv:'✅ AI PCB',ai:'',space:'',robot:'',low:'',overlap:2},
  {name:'胜宏科技',code:'300476',musk:'',nv:'✅ GPU PCB',ai:'(昇腾<10%)',space:'',robot:'',low:'',overlap:1},
];

// ═══ RENDER ═══
let STOCK_DATA = [];
fetch('stock-data.json').then(r=>r.json()).then(d=>{
  STOCK_DATA = d;
  renderAll();
});

function renderAll() {
  renderEcoGrid();
  renderFreshness();
  renderBottleneckTable();
  renderCrossMatrix();
  renderGaps();
  fetchAndShowPrices();
  document.getElementById('freshBadge').innerHTML = '<span class="fresh">✅ 数据已加载</span> · ' + new Date().toLocaleDateString('zh-CN');
  document.getElementById('footer').innerHTML = `📁 数据源: <a href="stock-data.json">stock-data.json</a> (${STOCK_DATA.length}只标的) · <a href="events-data.js">events-data.js</a> · 方法论 <a href="供应链映射方法论.md">v2.7</a><br>💹 股价: <a href="https://hq.sinajs.cn">新浪财经免费API</a> (页面打开时自动拉取, 无需手动填)<br>🔄 打开即最新 — 新增标的只需往 stock-data.json 加一条记录<br>⚠️ 所有评分均为 E2 初评，不构成投资建议。`;
}

function fetchAndShowPrices() {
  if (typeof StockPrice === 'undefined') { document.getElementById('priceContent').innerHTML = '股价模块未加载'; return; }
  var codes = STOCK_DATA.filter(function(s){return s.bottleneck;}).map(function(s){return s.code;});
  if (codes.length === 0) return;
  StockPrice.fetch(codes, function(data) {
    var html = '<table><tr><th>标的</th><th>现价</th><th>涨跌幅</th><th>今开</th><th>昨收</th></tr>';
    codes.forEach(function(c) {
      var d = data[c];
      if (!d || !d.price) { html += '<tr><td>'+c+'</td><td colspan="4" style="color:var(--t3)">数据获取失败(非交易时段或网络问题)</td></tr>'; return; }
      var cls = parseFloat(d.change) >= 0 ? 'color:var(--rd)' : 'color:var(--gr)';
      html += '<tr><td><b>'+d.name+'</b><br><span style="font-size:0.6rem;color:var(--t3)">'+c+'</span></td>';
      html += '<td><b>'+d.price+'</b></td>';
      html += '<td style="'+cls+'">'+(parseFloat(d.change)>=0?'+':'')+d.change+' ('+(parseFloat(d.change_pct)>=0?'+':'')+d.change_pct+'%)</td>';
      html += '<td>'+d.open+'</td><td>'+d.prev_close+'</td></tr>';
    });
    html += '</table><div style="font-size:0.58rem;color:var(--t3);margin-top:6px">🕐 更新时间: ' + new Date().toLocaleTimeString('zh-CN') + ' · 数据源: 新浪财经</div>';
    document.getElementById('priceContent').innerHTML = html;
  });
}

function renderEcoGrid() {
  const g = document.getElementById('ecoGrid');
  const totalSW = STOCK_DATA.filter(s=>s.bottleneck).length;
  const totalStocks = Object.values(ECOS).reduce((a,e)=>a+e.stocks,0);
  g.innerHTML = Object.entries(ECOS).map(([k,v])=>`
    <div class="eco-card" style="border-color:${v.type==='us'?'rgba(59,130,246,.2)':'rgba(239,68,68,.2)'}">
      <div class="name">${v.icon} ${k}</div>
      <div class="count" style="color:${v.type==='us'?'#60a5fa':'#f87171'}">${v.stocks}</div>
      <div style="font-size:0.6rem;color:var(--t3)">只标的</div>
      ${v.sw>0?`<div class="sw">🔴 ${v.sw} 物理开关</div>`:''}
    </div>
  `).join('') + `
  <div style="grid-column:1/-1;text-align:center;font-size:0.65rem;color:var(--t2);padding:6px">
    共 <b>${totalStocks}</b> 只标的 · <b>${totalSW}</b> 只物理开关 · 2 美国生态 + 4 国内生态
  </div>`;
}

function renderFreshness() {
  const now = new Date();
  const items = [
    {label:'美国生态 E1 审计',date:'2026-06-06',status:'fresh'},
    {label:'国内生态 E1 审计',date:'2026-06-06',status:'stale',note:'仅4只物理开关，其余未审计'},
    {label:'事件追踪器 evt_005',date:'2026-06-05',status:'stale',note:'d5待6/12回填'},
    {label:'情景矩阵 S3/S8/S9/S10概率',date:'2026-06-06',status:'fresh'},
    {label:'Cron 监控任务',date:'2026-06-06',status:'stale',note:'3个🔁 6/13过期'},
    {label:'supply-chain.html',date:'2026-06-05',status:'stale',note:'未含今日低空经济更新'},
  ];
  const fresh = items.filter(i=>i.status==='fresh').length;
  const stale = items.filter(i=>i.status==='stale').length;
  document.getElementById('freshnessPanel').innerHTML = `
    <div class="panel-title">📊 数据时效</div>
    <div style="margin-bottom:8px"><span class="fresh">✅ ${fresh} 项最新</span> · <span class="stale">⚠️ ${stale} 项待更新</span></div>
    ${items.map(i=>`<div style="font-size:0.65rem;padding:3px 0;display:flex;justify-content:space-between"><span>${i.label} <span style="color:var(--t3)">${i.date}</span></span><span class="${i.status}">${i.status==='fresh'?'✅':'⚠️'}</span>${i.note?`<span style="font-size:0.58rem;color:var(--t3)">${i.note}</span>`:''}</div>`).join('')}
  `;

  document.getElementById('actionsPanel').innerHTML = `
    <div class="panel-title">📋 状态说明: 哪些自动化了 / 哪些还需手动</div>
    <div class="gap-row"><span>✅</span><div><b>股价</b> — 已自动化。页面打开时从新浪API拉取 (5只物理开关实时价格见上方面板)</div></div>
    <div class="gap-row"><span>✅</span><div><b>模型数据</b> — 已自动化。往 stock-data.json 加标的 → 所有页面自动刷新显示</div></div>
    <div class="gap-row"><span>✅</span><div><b>可视化图谱</b> — 已自动化。supply-chain.html / domestic-supply-chain.html 手动更新</div></div>
    <div class="gap-row"><span>📋</span><div><b>年报E1证据</b> — 需手动。下载PDF → Ctrl+F搜关键词 → 更新 stock-data.json 中 e1_audit[].level</div></div>
    <div class="gap-row"><span>📋</span><div><b>T3b工程判断</b> — 需手动。找工程专家确认替代技术路线 (5个标的 × 各1位专家)</div></div>
    <div class="gap-row"><span>📋</span><div><b>事件回填</b> — 需手动。evt_005 d5需6/12收盘后回填 (价格每日自动获取, 但事件超额收益需事后计算)</div></div>
    <div class="gap-row"><span style="color:var(--t3)">ℹ️</span><div style="color:var(--t3)"><b>Cron</b> — 系统有7天过期限制。已放弃cron方案。改为: 你每次打开模型时自动拉最新数据。D+5/D+20/黄仁勋听证等一次性事件靠你自己记。</div></div>
  `;
}

function renderBottleneckTable() {
  const tb = document.getElementById('bnTable').querySelector('tbody');
  const sorted = [...STOCK_DATA].filter(s=>s.bottleneck).sort((a,b)=>b.score_v26-a.score_v26);
  tb.innerHTML = sorted.map(s=>{
    const p = s.score_detail;
    const psum = (p.P1||0)+(p.P2||0)+(p.P2b||0)+(p.P3||0)+(p.P4||0)+(p.P4b||0);
    const osum = (p.O1||0)+(p.O2||0)+(p.O3||0);
    const tsum = (p.T1||0)+(p.T2||0);
    const t3flag = typeof p.T3b==='string'?'⚠️E3':'';
    return `<tr>
      <td><a href="stock-view.html?code=${s.code}" style="font-weight:600">${s.name}</a><br><span style="font-size:0.6rem;color:var(--t3)">${s.code}</span></td>
      <td><span class="badge badge-cn">${s.ecosystem}</span></td>
      <td><b style="color:${s.score_v26>=14?'var(--gr)':'var(--yl)'}">${s.score_v26}</b></td>
      <td>${psum}</td><td>${osum}</td><td>${tsum}${t3flag}</td>
      <td style="font-size:0.62rem">${s.key_e1.substring(0,40)}…</td>
      <td style="font-size:0.62rem">${s.risks[0].text.substring(0,30)}…</td>
      <td><span class="badge ${s.score_v26>=14?'badge-ok':'badge-warn'}">${s.score_grade}</span></td>
    </tr>`;
  }).join('');
}

function renderCrossMatrix() {
  const tb = document.getElementById('crossTable').querySelector('tbody');
  tb.innerHTML = CROSS_DATA.map(c=>`<tr>
    <td><a href="stock-view.html?code=${c.code}" style="font-weight:600">${c.name}</a><br><span style="font-size:0.6rem;color:var(--t3)">${c.code}</span></td>
    <td>${c.musk||'—'}</td><td>${c.nv||'—'}</td><td>${c.ai||'—'}</td><td>${c.space||'—'}</td><td>${c.robot||'—'}</td><td>${c.low||'—'}</td>
    <td><b>${c.overlap}</b></td>
  </tr>`).join('');
}

function renderGaps() {
  const allGaps = STOCK_DATA.flatMap(s=>s.gaps.map(g=>({stock:`${s.name}(${s.code})`,gap:g})));
  const critical = allGaps.filter(g=>g.gap.startsWith('🔴'));
  const normal = allGaps.filter(g=>!g.gap.startsWith('🔴'));
  document.getElementById('gapsList').innerHTML = `
    <div style="font-size:0.65rem;color:var(--rd);margin-bottom:6px">🔴 需工程专家 (${critical.length}条)</div>
    ${critical.map(g=>`<div class="gap-row"><span style="color:var(--rd)">🔴</span><span style="font-size:0.6rem;color:var(--t3)">${g.stock}</span> ${g.gap.replace('🔴 ','')}</div>`).join('')}
    <div style="font-size:0.65rem;color:var(--yl);margin:10px 0 6px">📋 待翻年报/公告 (${normal.length}条)</div>
    ${normal.slice(0,10).map(g=>`<div class="gap-row"><span>📋</span><span style="font-size:0.6rem;color:var(--t3)">${g.stock}</span> ${g.gap}</div>`).join('')}
    ${normal.length>10?`<div style="font-size:0.6rem;color:var(--t3);padding:4px">…还有 ${normal.length-10} 条，见 stock-view.html 各标的详情</div>`:''}
  `;
}
</script>
</body>
</html>
